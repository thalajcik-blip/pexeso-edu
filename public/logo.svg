<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0d1b2a"/>

  <!-- Brain silhouette: two lobes, rounded body -->
  <path d="
    M 50 78
    C 34 78, 18 68, 16 55
    C 14 45, 20 36, 28 32
    C 24 20, 30 10, 41 10
    C 45 10, 48 12, 50 15
    C 52 12, 55 10, 59 10
    C 70 10, 76 20, 72 32
    C 80 36, 86 45, 84 55
    C 82 68, 66 78, 50 78 Z
  " fill="#162944" stroke="rgba(249,215,78,0.45)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Interhemispheric fissure (center divide) -->
  <line x1="50" y1="15" x2="50" y2="78" stroke="#0d1b2a" stroke-width="3.5"/>

  <!-- Subtle brain convolution lines - left -->
  <path d="M 26 44 C 30 40, 36 42, 38 46" fill="none" stroke="rgba(249,215,78,0.25)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 22 56 C 27 52, 34 54, 34 60" fill="none" stroke="rgba(249,215,78,0.25)" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtle brain convolution lines - right -->
  <path d="M 74 44 C 70 40, 64 42, 62 46" fill="none" stroke="rgba(249,215,78,0.25)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 78 56 C 73 52, 66 54, 66 60" fill="none" stroke="rgba(249,215,78,0.25)" stroke-width="2" stroke-linecap="round"/>

  <!-- Lightning bolt (centered) -->
  <path d="M 57 16 L 42 51 L 53 51 L 44 82 L 67 47 L 55 47 Z"
        fill="#f9d74e"
        filter="drop-shadow(0 0 6px rgba(249,215,78,0.6))"/>
</svg>
